      const t = u * Math.PI * 2 * 7;

// =======================================================
// CONVOLUTION REVERB (Algorithmic IR generation)
// =======================================================
class ConvolutionReverb {
  constructor(ctx, options = {}) {
    this.ctx = ctx;
    this.input = ctx.createGain();
    this.output = ctx.createGain();
    this.output.gain.value = options.outputGain || 0.5;
    
    // Reverb parameters
    this.duration = options.duration || 4.0;        // IR length in seconds
    this.decay = options.decay || 2.5;              // Decay factor (higher = faster decay)
    this.density = options.density || 0.8;          // Reflection density (0-1)
    this.damping = options.damping || 0.6;          // High frequency damping (0-1)
    this.preDelay = options.preDelay || 0.02;       // Pre-delay in seconds
    this.stereoWidth = options.stereoWidth || 0.8;  // Stereo decorrelation (0-1)
    
    // Create convolver
    this.convolver = ctx.createConvolver();
    
    // Pre-delay
    this.preDelayNode = ctx.createDelay(0.1);
    this.preDelayNode.delayTime.value = this.preDelay;
    
    // Input filter - remove some low end before reverb
    this.inputFilter = ctx.createBiquadFilter();
    this.inputFilter.type = 'highpass';
    this.inputFilter.frequency.value = 180;
    this.inputFilter.Q.value = 0.5;
    
    // Output filter - gentle high cut for warmth
    this.outputFilter = ctx.createBiquadFilter();
    this.outputFilter.type = 'lowpass';
    this.outputFilter.frequency.value = 6000;
    this.outputFilter.Q.value = 0.5;
    
    // Connect
    this.input.connect(this.inputFilter);
    this.inputFilter.connect(this.preDelayNode);
    this.preDelayNode.connect(this.convolver);
    this.convolver.connect(this.outputFilter);
    this.outputFilter.connect(this.output);
    
    // Generate the impulse response
    this.generateIR();
  }
  
  generateIR() {
    const sampleRate = this.ctx.sampleRate;
    const length = Math.floor(sampleRate * this.duration);
    
    // Create stereo buffer
    const buffer = this.ctx.createBuffer(2, length, sampleRate);
    const leftChannel = buffer.getChannelData(0);
    const rightChannel = buffer.getChannelData(1);
    
    // Generate noise-based IR with decay and damping
    for (let i = 0; i < length; i++) {
      const t = i / sampleRate;  // Time in seconds
      const progress = i / length;  // 0 to 1
      
      // Exponential decay envelope
      const envelope = Math.exp(-t * this.decay);
      
      // High frequency damping (increases over time)
      // We simulate this by reducing high-frequency content as we progress
      const dampingFactor = 1 - (this.damping * progress);
      
      // Density: skip some samples for sparser reflections at start
      const densityThreshold = this.density * (0.3 + 0.7 * progress);
      
      // Generate decorrelated noise for L/R
      let noiseL = 0;
      let noiseR = 0;
      
      if (Math.random() < densityThreshold) {
        // Base noise
        noiseL = (Math.random() * 2 - 1);
        noiseR = (Math.random() * 2 - 1);
        
        // Apply simple lowpass for damping (moving average simulation)
        if (i > 0) {
          const lpAmount = 1 - dampingFactor;
          noiseL = noiseL * dampingFactor + leftChannel[i - 1] * lpAmount * 0.5;
          noiseR = noiseR * dampingFactor + rightChannel[i - 1] * lpAmount * 0.5;
        }
        
        // Stereo width: blend L/R based on stereoWidth
        const mid = (noiseL + noiseR) * 0.5;
        const side = (noiseL - noiseR) * 0.5;
        noiseL = mid + side * this.stereoWidth;
        noiseR = mid - side * this.stereoWidth;
      }
      
      // Apply envelope
      leftChannel[i] = noiseL * envelope;
      rightChannel[i] = noiseR * envelope;
    }
    
    // Add some early reflections (discrete echoes in first 80ms)
    const earlyReflections = [
      { time: 0.012, gain: 0.7 },
      { time: 0.019, gain: 0.5 },
      { time: 0.028, gain: 0.4 },
      { time: 0.037, gain: 0.35 },
      { time: 0.048, gain: 0.3 },
      { time: 0.063, gain: 0.25 },
      { time: 0.079, gain: 0.2 },
    ];
    
    earlyReflections.forEach(ref => {
      const sampleIndex = Math.floor(ref.time * sampleRate);
      if (sampleIndex < length) {
        // Add a small burst for each early reflection
        const burstLength = Math.floor(0.003 * sampleRate); // 3ms burst
        for (let j = 0; j < burstLength && sampleIndex + j < length; j++) {
          const burstEnv = Math.exp(-j / (burstLength * 0.3));
          const noise = (Math.random() * 2 - 1) * ref.gain * burstEnv;
          leftChannel[sampleIndex + j] += noise * (0.8 + Math.random() * 0.4);
          rightChannel[sampleIndex + j] += noise * (0.8 + Math.random() * 0.4);
        }
      }
    });
    
    // Normalize the buffer to prevent clipping
    let maxSample = 0;
    for (let i = 0; i < length; i++) {
      maxSample = Math.max(maxSample, Math.abs(leftChannel[i]), Math.abs(rightChannel[i]));
    }
    if (maxSample > 0) {
      const normalizeGain = 0.9 / maxSample;
      for (let i = 0; i < length; i++) {
        leftChannel[i] *= normalizeGain;
        rightChannel[i] *= normalizeGain;
      }
    }
    
    this.convolver.buffer = buffer;
  }
  
  // Method to regenerate IR with new parameters
  setParameters(options) {
    if (options.duration !== undefined) this.duration = options.duration;
    if (options.decay !== undefined) this.decay = options.decay;
    if (options.density !== undefined) this.density = options.density;
    if (options.damping !== undefined) this.damping = options.damping;
    if (options.stereoWidth !== undefined) this.stereoWidth = options.stereoWidth;
    if (options.preDelay !== undefined) {
      this.preDelay = options.preDelay;
      this.preDelayNode.delayTime.value = this.preDelay;
    }
    if (options.outputGain !== undefined) {
      this.output.gain.value = options.outputGain;
    }
    this.generateIR();
  }
}

// =======================================================
// DRONE VOICE CLASS - Stacked Fifths Overtone Series
// =======================================================
class DroneVoice {
  constructor(ctx, config, masterOut, reverbSend, elementName) {
    this.ctx = ctx;
    this.config = config;
    this.elementName = elementName;
    this.isPlaying = false;
    this.targetGain = 0;
    this.currentGain = 0;
    
    // === FIVE OSCILLATORS: Stacked fifths overtone series ===
    // Each successive fifth is quieter (natural overtone falloff)
    
    // 1st partial - ROOT (loudest)
    this.osc1 = ctx.createOscillator();
    this.osc1.type = config.waveform;
    this.osc1.frequency.value = config.baseFreq;
    this.osc1Gain = ctx.createGain();
    this.osc1Gain.gain.value = 1.0;
    
    // 2nd partial - FIFTH
    this.osc2 = ctx.createOscillator();
    this.osc2.type = config.waveform === 'sawtooth' ? 'sawtooth' : 'sine';
    this.osc2.frequency.value = config.secondFreq;
    this.osc2.detune.value = config.detuneRange * 0.3;
    this.osc2Gain = ctx.createGain();
    this.osc2Gain.gain.value = 0.6;
    
    // 3rd partial - NINTH (fifth of fifth)
    this.osc3 = ctx.createOscillator();
    this.osc3.type = 'sine';
    this.osc3.frequency.value = config.thirdFreq;
    this.osc3.detune.value = -config.detuneRange * 0.2;
    this.osc3Gain = ctx.createGain();
    this.osc3Gain.gain.value = 0.35;
    
    // 4th partial - THIRTEENTH
    this.osc4 = ctx.createOscillator();
    this.osc4.type = 'sine';
    this.osc4.frequency.value = config.fourthFreq;
    this.osc4.detune.value = config.detuneRange * 0.15;
    this.osc4Gain = ctx.createGain();
    this.osc4Gain.gain.value = 0.2;
    
    // 5th partial - HIGHEST (quietest, adds shimmer)
    this.osc5 = ctx.createOscillator();
    this.osc5.type = 'sine';
    this.osc5.frequency.value = config.fifthFreq;
    this.osc5Gain = ctx.createGain();
    this.osc5Gain.gain.value = 0.1;
    
    // === NOISE LAYER for AIR ===
    this.noiseNode = null;
    this.noiseFilter = null;
    this.noiseGain = null;
    this.noiseLfo = null;
    this.noiseLfoGain = null;
    
    if (elementName === 'air') {
      const bufferSize = ctx.sampleRate * 2;
      const noiseBuffer = ctx.createBuffer(2, bufferSize, ctx.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const data = noiseBuffer.getChannelData(ch);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
      }
      
      this.noiseNode = ctx.createBufferSource();
      this.noiseNode.buffer = noiseBuffer;
      this.noiseNode.loop = true;
      
      this.noiseFilter = ctx.createBiquadFilter();
      this.noiseFilter.type = 'bandpass';
      this.noiseFilter.frequency.value = 2500;
      this.noiseFilter.Q.value = 0.8;
      
      this.noiseFilterHigh = ctx.createBiquadFilter();
      this.noiseFilterHigh.type = 'highpass';
      this.noiseFilterHigh.frequency.value = 3000;
      this.noiseFilterHigh.Q.value = 0.5;
      
      this.noiseGain = ctx.createGain();
      this.noiseGain.gain.value = 0;
      
      this.noiseLfo = ctx.createOscillator();
      this.noiseLfo.type = 'sine';
      this.noiseLfo.frequency.value = 0.08;
      
      this.noiseLfoGain = ctx.createGain();
      this.noiseLfoGain.gain.value = 800;
      
      this.noiseAmpLfo = ctx.createOscillator();
      this.noiseAmpLfo.type = 'sine';
      this.noiseAmpLfo.frequency.value = 0.12;
      
      this.noiseAmpLfoGain = ctx.createGain();
      this.noiseAmpLfoGain.gain.value = 0;
      
      this.noiseLfo.connect(this.noiseLfoGain);
      this.noiseLfoGain.connect(this.noiseFilter.frequency);
      
      this.noiseAmpLfo.connect(this.noiseAmpLfoGain);
      this.noiseAmpLfoGain.connect(this.noiseGain.gain);
      
      this.noiseNode.connect(this.noiseFilter);
      this.noiseFilter.connect(this.noiseFilterHigh);
      this.noiseFilterHigh.connect(this.noiseGain);
    }
    
    // LFO for filter modulation
    this.lfo = ctx.createOscillator();
    this.lfo.type = 'sine';
    this.lfo.frequency.value = config.lfoRate;
    
    this.lfoGain = ctx.createGain();
    this.lfoGain.gain.value = 0;
    
    // === RHYTHMIC PULSE LFO - Deep breathing rhythm per element ===
    // Earth: very slow, deep throb (tectonic breathing)
    // Water: gentle wave rhythm (tidal pulse)
    // Air: irregular, breathy (wind gusts) - uses triangle for softer peaks
    // Fire: faster, restless (flickering heartbeat)
    
    this.pulseLfo = ctx.createOscillator();
    this.pulseGain = ctx.createGain();
    
    if (elementName === 'earth') {
      // Earth: very slow, deep, steady - like tectonic breathing
      this.pulseLfo.type = 'sine';
      this.pulseLfo.frequency.value = 0.08; // ~12 second cycle
      this.pulseDepth = 0.25; // 25% amplitude variation
    } else if (elementName === 'water') {
      // Water: gentle wave rhythm - tidal ebb and flow
      this.pulseLfo.type = 'sine';
      this.pulseLfo.frequency.value = 0.15; // ~7 second cycle
      this.pulseDepth = 0.20; // 20% amplitude variation
    } else if (elementName === 'air') {
      // Air: slightly irregular, breathy - like wind gusts
      this.pulseLfo.type = 'triangle'; // Softer peaks
      this.pulseLfo.frequency.value = 0.22; // ~4.5 second cycle
      this.pulseDepth = 0.18; // 18% amplitude variation
    } else if (elementName === 'fire') {
      // Fire: faster, more restless - flickering (increased to compensate for removed tremolo)
      this.pulseLfo.type = 'sine';
      this.pulseLfo.frequency.value = 0.5; // ~2 second cycle (was 0.35)
      this.pulseDepth = 0.28; // 28% amplitude variation (was 0.22)
    }
    
    // Pulse gain starts at 0, scaled by weight
    this.pulseGain.gain.value = 0;
    
    // === PITCH MODULATION LFO - Element-specific character ===
    // Earth: almost none (stable)
    // Water: slow gentle drift (tidal)
    // Air: moderate gentle movement (breeze)
    // Fire: faster unstable wobble (flickering)
    
    this.pitchLfo = ctx.createOscillator();
    this.pitchLfo.type = 'sine';
    
    this.pitchLfoGain = ctx.createGain();
    
    if (elementName === 'earth') {
      // Earth: extremely slow, barely perceptible - geological stability
      this.pitchLfo.frequency.value = 0.02;
      this.pitchLfoGain.gain.value = 1; // Just 1 cent of drift
    } else if (elementName === 'water') {
      // Water: slow tidal drift - emotional, flowing
      this.pitchLfo.frequency.value = 0.04;
      this.pitchLfoGain.gain.value = 6; // Gentle pitch waves
    } else if (elementName === 'air') {
      // Air: moderate breeze-like movement
      this.pitchLfo.frequency.value = 0.08;
      this.pitchLfoGain.gain.value = 8; // Airy drift
    } else if (elementName === 'fire') {
      // Fire: faster flickering instability
      this.pitchLfo.frequency.value = 0.25;
      this.pitchLfoGain.gain.value = 15; // Noticeable wobble
    }
    
    // Connect pitch LFO to all oscillator detunes
    this.pitchLfo.connect(this.pitchLfoGain);
    this.pitchLfoGain.connect(this.osc1.detune);
    this.pitchLfoGain.connect(this.osc2.detune);
    this.pitchLfoGain.connect(this.osc3.detune);
    this.pitchLfoGain.connect(this.osc4.detune);
    this.pitchLfoGain.connect(this.osc5.detune);
    
    // Main Filter
    this.filter = ctx.createBiquadFilter();
    this.filter.type = config.filterType;
    this.filter.frequency.value = config.baseCutoff;
    this.filter.Q.value = config.resonance;
    
    // === RESONANT FILTER tuned to pentatonic scale ===
    // This filter "sings" at frequencies from the element's scale
    // Creating vowel-like formants that reinforce the harmonic identity
    this.resonantFilter = ctx.createBiquadFilter();
    this.resonantFilter.type = 'peaking';
    this.resonantFilter.Q.value = 4; // Moderate resonance
    this.resonantFilter.gain.value = 3; // Subtle boost
    
    // Define resonant frequencies for each element (pentatonic scale tones)
    this.resonantFreqs = {
      earth: [130.81, 146.83, 164.81, 196.00, 220.00],  // C3, D3, E3, G3, A3
      water: [196.00, 220.00, 246.94, 293.66, 329.63],  // G3, A3, B3, D4, E4
      air: [293.66, 329.63, 369.99, 440.00, 493.88],    // D4, E4, F#4, A4, B4
      fire: [440.00, 493.88, 554.37, 659.26, 739.99]    // A4, B4, C#5, E5, F#5
    }[elementName];
    
    // Start at root frequency
    this.resonantFilter.frequency.value = this.resonantFreqs[0];
    this.currentResonantIndex = 0;
    
    // Slowly step through scale tones (different rate per element)
    this.resonantStepRate = {
      earth: 8000,   // Very slow - geological
      water: 5000,   // Slow - tidal
      air: 3000,     // Moderate - breezy
      fire: 2000     // Faster - flickering
    }[elementName];
    
    this.resonantInterval = null;
    
    // Pre-filter mixer (all oscillators sum here)
    this.preMix = ctx.createGain();
    this.preMix.gain.value = 1;
    
    // Amplitude envelope
    this.ampGain = ctx.createGain();
    this.ampGain.gain.value = 0;
    
    // Pulse destination (breathing rhythm)
    this.pulseNode = ctx.createGain();
    this.pulseNode.gain.value = 1;
    
    // Reverb send
    this.reverbSendGain = ctx.createGain();
    const reverbAmount = (elementName === 'water') ? 0.66 : 
                         (elementName === 'air') ? 0.50 : 
                         (elementName === 'earth') ? 0.33 : 0.25;
    this.reverbSendGain.gain.value = reverbAmount;
    
    // === CONNECTIONS ===
    
    // Filter LFO
    this.lfo.connect(this.lfoGain);
    this.lfoGain.connect(this.filter.frequency);
    
    // Pulse LFO (breathing)
    this.pulseLfo.connect(this.pulseGain);
    this.pulseGain.connect(this.pulseNode.gain);
    
    // All 5 partials → pre-mix
    this.osc1.connect(this.osc1Gain);
    this.osc1Gain.connect(this.preMix);
    
    this.osc2.connect(this.osc2Gain);
    this.osc2Gain.connect(this.preMix);
    
    this.osc3.connect(this.osc3Gain);
    this.osc3Gain.connect(this.preMix);
    
    this.osc4.connect(this.osc4Gain);
    this.osc4Gain.connect(this.preMix);
    
    this.osc5.connect(this.osc5Gain);
    this.osc5Gain.connect(this.preMix);
    
    // Pre-mix → filter → resonant filter → amp → pulse → output
    this.preMix.connect(this.filter);
    this.filter.connect(this.resonantFilter);
    this.resonantFilter.connect(this.ampGain);
    this.ampGain.connect(this.pulseNode);
    this.pulseNode.connect(masterOut);
    this.pulseNode.connect(this.reverbSendGain);
    this.reverbSendGain.connect(reverbSend);
    
    // Air's noise layer (connects before pulse so it also breathes)
    if (elementName === 'air' && this.noiseGain) {
      this.noiseGain.connect(this.pulseNode);
    }
  }
  
  start() {
    if (this.isPlaying) return;
    const now = this.ctx.currentTime;
    this.osc1.start(now);
    this.osc2.start(now);
    this.osc3.start(now);
    this.osc4.start(now);
    this.osc5.start(now);
    this.lfo.start(now);
    this.pulseLfo.start(now);
    this.pitchLfo.start(now);
    
    if (this.elementName === 'air') {
      if (this.noiseNode) this.noiseNode.start(now);
      if (this.noiseLfo) this.noiseLfo.start(now);
      if (this.noiseAmpLfo) this.noiseAmpLfo.start(now);
    }
    
    this.isPlaying = true;
  }
  
  // Step resonant filter to next scale tone (called by global scheduler)
  stepResonantFilter() {
    // Only step if we have audible weight
    if (this.targetGain < 0.1) return;
    
    // Move to next scale tone (with slight randomness for organic feel)
    if (Math.random() < 0.7) {
      // Usually step forward
      this.currentResonantIndex = (this.currentResonantIndex + 1) % this.resonantFreqs.length;
    } else {
      // Sometimes jump randomly
      this.currentResonantIndex = Math.floor(Math.random() * this.resonantFreqs.length);
    }
    
    const targetFreq = this.resonantFreqs[this.currentResonantIndex];
    const now = this.ctx.currentTime;
    
    // Smooth glide to new frequency
    this.resonantFilter.frequency.cancelScheduledValues(now);
    this.resonantFilter.frequency.setTargetAtTime(targetFreq, now, 0.5);
  }
  
  setWeight(weight, transitionTime = 0.5) {
    // Safety: clamp weight and ensure it's a valid number
    weight = Math.max(0, Math.min(1, weight || 0));
    if (!isFinite(weight)) weight = 0;
    
    this.targetGain = weight;
    const now = this.ctx.currentTime;
    const config = this.config;
    
    // Amplitude (with very slow attack/release for pad feel)
    const targetAmp = Math.pow(weight, 0.7) * 0.15; // Soft curve, keep overall quiet
    if (isFinite(targetAmp)) {
      this.ampGain.gain.cancelScheduledValues(now);
      this.ampGain.gain.setTargetAtTime(Math.max(0, targetAmp), now, transitionTime);
    }
    
    // Filter cutoff follows weight
    const cutoff = config.baseCutoff + (config.maxCutoff - config.baseCutoff) * weight;
    if (isFinite(cutoff)) {
      this.filter.frequency.cancelScheduledValues(now);
      this.filter.frequency.setTargetAtTime(Math.max(20, cutoff), now, transitionTime * 0.8);
    }
    
    // LFO depth scales with weight
    const lfoAmount = (config.maxCutoff - config.baseCutoff) * config.lfoDepth * weight;
    if (isFinite(lfoAmount)) {
      this.lfoGain.gain.cancelScheduledValues(now);
      this.lfoGain.gain.setTargetAtTime(Math.max(0, lfoAmount), now, transitionTime);
    }
    
    // Subtle detune modulation
    const detuneVal = config.detuneRange * (0.5 + weight * 0.5);
    if (isFinite(detuneVal)) {
      this.osc2.detune.cancelScheduledValues(now);
      this.osc2.detune.setTargetAtTime(detuneVal, now, transitionTime);
      // Osc3 gets opposite detune for wider stereo/chorus
      this.osc3.detune.cancelScheduledValues(now);
      this.osc3.detune.setTargetAtTime(-detuneVal * 0.7, now, transitionTime);
    }
    
    // Rhythmic pulse depth - deeper when more in this element
    const pulseAmount = this.pulseDepth * weight;
    if (isFinite(pulseAmount)) {
      this.pulseGain.gain.cancelScheduledValues(now);
      this.pulseGain.gain.setTargetAtTime(pulseAmount, now, transitionTime);
    }
    
    // Resonant filter gain - more prominent when deeper in element
    const resonantGain = 2 + weight * 4; // Range from 2 to 6 dB boost
    if (isFinite(resonantGain)) {
      this.resonantFilter.gain.cancelScheduledValues(now);
      this.resonantFilter.gain.setTargetAtTime(resonantGain, now, transitionTime);
    }
    
    // Air's wind noise layer
    if (this.elementName === 'air' && this.noiseGain) {
      const noiseLevel = weight * 0.12; // Breathy wind noise
      const noiseAmpMod = weight * 0.04; // Wind gusts amplitude modulation
      
      this.noiseGain.gain.cancelScheduledValues(now);
      this.noiseGain.gain.setTargetAtTime(noiseLevel, now, transitionTime);
      
      if (this.noiseAmpLfoGain) {
        this.noiseAmpLfoGain.gain.cancelScheduledValues(now);
        this.noiseAmpLfoGain.gain.setTargetAtTime(noiseAmpMod, now, transitionTime);
      }
    }
  }
}

// =======================================================
// CONSOLIDATED RESONANT STEPPER - One timer for all drones
// =======================================================
let resonantStepperInterval = null;

function startResonantStepper() {
  if (resonantStepperInterval) return;
  
  // Step all drones' resonant filters at a unified rate
  // Each drone will only actually step if it has audible weight
  resonantStepperInterval = setInterval(() => {
    for (const drone of Object.values(drones)) {
      // Add some randomness per drone so they don't all step at exactly the same time
      if (Math.random() < 0.4) {
        drone.stepResonantFilter();
      }
    }
  }, 2000); // Check every 2 seconds, randomness creates variation
}

// =======================================================
// PEDAL TONE - Shifting tonal gravity based on dominant element
// =======================================================
// A deep bass note that follows the dominant element's root,
// creating a sense of "home" that shifts as you move through space

const PEDAL_ROOTS = {
  earth: 32.70,   // C1 - deepest, most grounded
  water: 49.00,   // G1 - fifth above Earth
  air: 73.42,     // D2 - fifth above Water  
  fire: 55.00     // A1 - fifth above Air (completes the cycle)
};

let pedalOsc = null;
let pedalOsc2 = null;     // Octave above for richness
let pedalGain = null;
let pedalFilter = null;
let pedalCurrentFreq = PEDAL_ROOTS.earth;

function initPedalTone() {
  if (!audioCtx) return;
  
  // Main pedal oscillator - deep sine
  pedalOsc = audioCtx.createOscillator();
  pedalOsc.type = 'sine';
  pedalOsc.frequency.value = pedalCurrentFreq;
  
  // Second oscillator - octave above, quieter, for richness
  pedalOsc2 = audioCtx.createOscillator();
  pedalOsc2.type = 'sine';
  pedalOsc2.frequency.value = pedalCurrentFreq * 2;
  
  // Gentle lowpass to keep it subby
  pedalFilter = audioCtx.createBiquadFilter();
  pedalFilter.type = 'lowpass';
  pedalFilter.frequency.value = 150;
  pedalFilter.Q.value = 1;
  
  // Gain control - starts silent
  pedalGain = audioCtx.createGain();
  pedalGain.gain.value = 0;
  
  // Mixer for the two oscillators
  const pedalMixer = audioCtx.createGain();
  pedalMixer.gain.value = 1;
  
  const pedalOsc2Gain = audioCtx.createGain();
  pedalOsc2Gain.gain.value = 0.3; // Octave is quieter
  
  // Connect
  pedalOsc.connect(pedalMixer);
  pedalOsc2.connect(pedalOsc2Gain);
  pedalOsc2Gain.connect(pedalMixer);
  pedalMixer.connect(pedalFilter);
  pedalFilter.connect(pedalGain);
  pedalGain.connect(masterGain);
  
  // Also send to reverb for depth
  const pedalReverb = audioCtx.createGain();
  pedalReverb.gain.value = 0.3;
  pedalGain.connect(pedalReverb);
  pedalReverb.connect(reverbNode.input);
  
  // Start oscillators
  const now = audioCtx.currentTime;
  pedalOsc.start(now);
  pedalOsc2.start(now);
}

function updatePedalTone(weights) {
  if (!audioCtx || !pedalOsc || !pedalGain) return;
  
  const now = audioCtx.currentTime;
  
  // Calculate target frequency as weighted average of roots
  let targetFreq = 0;
  let maxWeight = 0;
  let dominantElement = 'earth';
  
  for (const [element, weight] of Object.entries(weights)) {
    targetFreq += PEDAL_ROOTS[element] * weight;
    if (weight > maxWeight) {
      maxWeight = weight;
      dominantElement = element;
    }
  }
  
  // Smooth frequency transition (very slow for deep bass - avoids clicks)
  if (Math.abs(targetFreq - pedalCurrentFreq) > 0.5) {
    pedalOsc.frequency.setTargetAtTime(targetFreq, now, 2.0);
    pedalOsc2.frequency.setTargetAtTime(targetFreq * 2, now, 2.0);
    pedalCurrentFreq = targetFreq;
  }
  
  // Pedal volume based on how "centered" we are on any element
  // Louder when deeply in one element, quieter when between
  const centeredness = Math.pow(maxWeight, 1.5); // Emphasize dominance
  const targetGain = centeredness * 0.25; // Max 25% of master
  
  pedalGain.gain.setTargetAtTime(targetGain, now, 0.5);
  
  // Filter opens slightly when in Fire/Air (brighter), closes in Earth/Water (darker)
  const brightness = weights.fire * 0.4 + weights.air * 0.3 + weights.water * 0.15 + weights.earth * 0.1;
  const filterFreq = 80 + brightness * 150; // 80-230 Hz range
  pedalFilter.frequency.setTargetAtTime(filterFreq, now, 0.3);
}

// =======================================================
// GRANULAR TEXTURE LAYER - Pitched to Pentatonic Scales
// =======================================================
// Each element's grains play notes from its pentatonic scale
// (stacked fifths from root)

const PENTATONIC_SCALES = {
  // Earth: C major pentatonic (C, D, E, G, A) - multiple octaves
  earth: [65.41, 73.42, 82.41, 98.00, 110.00, 130.81, 146.83, 164.81, 196.00, 220.00],
  // Water: G major pentatonic (G, A, B, D, E) - multiple octaves
  water: [98.00, 110.00, 123.47, 146.83, 164.81, 196.00, 220.00, 246.94, 293.66, 329.63],
  // Air: D major pentatonic (D, E, F#, A, B) - multiple octaves
  air: [146.83, 164.81, 185.00, 220.00, 246.94, 293.66, 329.63, 369.99, 440.00, 493.88],
  // Fire: A major pentatonic (A, B, C#, E, F#) - multiple octaves
  fire: [220.00, 246.94, 277.18, 329.63, 369.99, 440.00, 493.88, 554.37, 659.26, 739.99]
};

// Grain spawner for subtle pitched texture
let grainInterval = null;

function spawnPitchedGrain(weight, element) {
  if (!audioCtx || weight < 0.15) return;
  
  const config = DRONE_CONFIG[element];
  const scale = PENTATONIC_SCALES[element];
  const now = audioCtx.currentTime;
  
  // Pick a random note from the element's pentatonic scale
  const freq = scale[Math.floor(Math.random() * scale.length)];
  
  // Element-specific grain characteristics
  let grainDur, attackRatio, releaseRatio, panWidth;
  
  if (element === 'earth') {
    // Earth: long, overlapping grains - dense, thick texture
    grainDur = 0.8 + Math.random() * 1.2;
    attackRatio = 0.4;
    releaseRatio = 0.5;
    panWidth = 0.3; // Narrow - grounded, centered
  } else if (element === 'water') {
    // Water: medium, flowing grains - continuous stream
    grainDur = 0.5 + Math.random() * 0.8;
    attackRatio = 0.3;
    releaseRatio = 0.6;
    panWidth = 0.5; // Medium spread
  } else if (element === 'air') {
    // Air: short, separated grains - sparse, open
    grainDur = 0.2 + Math.random() * 0.4;
    attackRatio = 0.2;
    releaseRatio = 0.7;
    panWidth = 0.8; // Wide - spacious, diffuse
  } else if (element === 'fire') {
    // Fire: very short, sharp grains - sparks, crackles
    grainDur = 0.1 + Math.random() * 0.25;
    attackRatio = 0.1;
    releaseRatio = 0.8;
    panWidth = 0.6; // Medium-wide - dancing sparks
  }
  
  // Create a simple sine oscillator grain
  const osc = audioCtx.createOscillator();
  osc.type = element === 'fire' ? 'triangle' : 'sine';
  osc.frequency.value = freq;
  // Subtle random detune for organic feel
  osc.detune.value = (Math.random() * 10 - 5);
  
  // Amplitude envelope - element-specific shape
  const amp = audioCtx.createGain();
  const peakGain = weight * 0.012 * (0.4 + Math.random() * 0.4);
  
  const attackTime = grainDur * attackRatio;
  const releaseStart = grainDur * (1 - releaseRatio);
  
  amp.gain.setValueAtTime(0, now);
  amp.gain.linearRampToValueAtTime(peakGain, now + attackTime);
  amp.gain.linearRampToValueAtTime(peakGain * 0.6, now + releaseStart);
  amp.gain.linearRampToValueAtTime(0, now + grainDur);
  
  // Stereo placement - element-specific width
  const pan = audioCtx.createStereoPanner();
  pan.pan.value = (Math.random() * 2 - 1) * panWidth;
  
  // Connect (filter removed - sine waves don't need it)
  osc.connect(amp);
  amp.connect(pan);
  pan.connect(masterGain);
  pan.connect(reverbNode.input);
  
  // Play
  osc.start(now);
  osc.stop(now + grainDur + 0.1);
}

// Textural density characteristics per element
const DENSITY_CONFIG = {
  earth: { 
    spawnChance: 0.5,    // High chance - dense texture
    interval: 300,       // Fast spawning
    grainsPerSpawn: 1    // Single grains (was 2, optimized)
  },
  water: { 
    spawnChance: 0.4,    // Medium-high - flowing continuous
    interval: 400,       // Medium
    grainsPerSpawn: 1
  },
  air: { 
    spawnChance: 0.2,    // Low - sparse, open
    interval: 600,       // Slower
    grainsPerSpawn: 1
  },
  fire: { 
    spawnChance: 0.45,   // High - active, many events
    interval: 250,       // Very fast
    grainsPerSpawn: 1    // But single grains (sparks)
  }
};

function startGrainScheduler() {
  if (grainInterval) return;
  
  // Use a faster base interval, with density controlled by spawn logic
  grainInterval = setInterval(() => {
    const weights = getElementWeights(currentX, currentY);
    
    // Calculate weighted density parameters
    let totalSpawnChance = 0;
    let totalGrains = 0;
    
    for (const [element, weight] of Object.entries(weights)) {
      if (weight < 0.1) continue;
      
      const config = DENSITY_CONFIG[element];
      
      // Spawn chance scales with weight AND element's base density
      const elementChance = weight * config.spawnChance;
      
      if (Math.random() < elementChance) {
        // Spawn grains based on element's density character
        const grainCount = config.grainsPerSpawn;
        for (let i = 0; i < grainCount; i++) {
          // Slight delay between multiple grains for natural feel
          setTimeout(() => {
            spawnPitchedGrain(weight, element);
          }, i * 50);
        }
      }
    }
  }, 300); // Optimized interval (was 200ms) - density controlled by spawn chances
}

  ],

    196.00, 220.00, 246.94, 293.66, 329.63, // Octave 3-4: G, A, B, D, E
    392.00, 440.00, 493.88, 587.33, 659.26, // Octave 4-5: G, A, B, D, E
    783.99, 880.00, 987.77, 1174.66, 1318.51 // Octave 5-6: G, A, B, D, E
  ],
  // Air: D pentatonic (D, E, F#, A, B) - light, mid-high
  air: [
    293.66, 329.63, 369.99, 440.00, 493.88, // Octave 4: D, E, F#, A, B
    587.33, 659.26, 739.99, 880.00, 987.77, // Octave 5: D, E, F#, A, B
    1174.66, 1318.51, 1479.98, 1760.00, 1975.53 // Octave 6: D, E, F#, A, B
  ],
  // Fire: A pentatonic (A, B, C#, E, F#) - bright, high
  fire: [
    440.00, 493.88, 554.37, 659.26, 739.99, // Octave 4-5: A, B, C#, E, F#
    880.00, 987.77, 1108.73, 1318.51, 1479.98, // Octave 5-6: A, B, C#, E, F#
