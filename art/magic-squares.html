<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinetic Synth - Colored Solid Squares</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background-color: #000; 
            cursor: crosshair; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; pointer-events: none; z-index: 5; width: 100%;
            color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(0,0,0,1);
        }
        .key-hint { margin-bottom: 5px; color: #fff; font-weight: bold; }
        .octave-display { font-size: 14px; color: #0ff; margin-top: 5px; transition: color 0.2s;}
        
        @media (max-width: 600px) {
            .desktop-only { display: none !important; }
            .key-hint { font-size: 12px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="ui-layer">
    <div class="key-hint"><span class="desktop-only">Keyboard: Chromatic (C2-C8) | </span>Touch & Drag to Play</div>
    <div class="desktop-only">Mouse: Fixed Pentatonic Ring</div>
    <div class="octave-display desktop-only" id="octave-val">KEYBOARD OCTAVE: 3</div>
</div>

<script>
    let isMobile = window.innerWidth < 600;

    // ============================================
    // 1. VISUAL STATE
    // ============================================
    const activeColor = new THREE.Color(0xffffff); 
    const mutedBgColor = new THREE.Color(0x000000); 
    const currentBgColor = new THREE.Color(0x000000); 
    
    let touchImpact = 0; 
    let tunnelActiveLevel = 0; 
    
    function updateVisualColor(visualIndex) {
        const safeIndex = Math.abs(visualIndex) % 40;
        const hue = safeIndex / 40;
        
        activeColor.setHSL(hue, 1.0, 0.5);
        mutedBgColor.setHSL(hue, 0.6, 0.08); 
        
        touchImpact = 1.0; 
        tunnelActiveLevel = 1.0; 
    }

    // ============================================
    // 2. AUDIO SYSTEM
    // ============================================
    let audioCtx = null;
    let synthBus, masterInput;
    let isMasterInitialized = false;
    let rtaAnalyser, rtaDataArray;

    function makeDistortionCurve(amount) {
        const k = amount; const n = 44100; const curve = new Float32Array(n);
        const deg = Math.PI/180;
        for (let i=0; i<n; ++i) {
            let x = i*2/n - 1;
            curve[i] = (3+k)*x*20*deg/(Math.PI+k*Math.abs(x));
        }
        return curve;
    }

    function initMasterAudio() {
        if (isMasterInitialized && audioCtx) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return;
        }
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();

        synthBus = audioCtx.createGain();
        const hp = audioCtx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=30;
        const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=20000;
        masterInput = audioCtx.createGain();

        let saturator = audioCtx.createWaveShaper(); saturator.curve = makeDistortionCurve(0); saturator.oversample = '4x';
        rtaAnalyser = audioCtx.createAnalyser(); rtaAnalyser.fftSize = 1024; rtaAnalyser.smoothingTimeConstant = 0.5;
        rtaDataArray = new Uint8Array(rtaAnalyser.frequencyBinCount);
        let compressor = audioCtx.createDynamicsCompressor(); compressor.threshold.value = -20; compressor.ratio.value = 4;
        let limiter = audioCtx.createDynamicsCompressor(); limiter.threshold.value = -1.0; limiter.ratio.value = 20; limiter.attack.value = 0.001;

        synthBus.connect(hp); hp.connect(lp); lp.connect(masterInput);
        masterInput.connect(saturator); saturator.connect(rtaAnalyser); rtaAnalyser.connect(compressor);
        compressor.connect(limiter); limiter.connect(audioCtx.destination);

        isMasterInitialized = true;
    }

    function playNote(freq) {
        if (!isMasterInitialized) initMasterAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'triangle'; 
        osc.frequency.value = freq;

        osc.connect(gain);
        gain.connect(synthBus);

        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.15, now + 0.01); 
        gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5); 

        osc.start(now);
        osc.stop(now + 1.5);
    }

    function forceUnlockAudio() { 
        if(!isMasterInitialized) initMasterAudio(); 
        if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        if(audioCtx) {
            const buffer = audioCtx.createBuffer(1, 1, 22050);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start(0);
        }
    }
    
    window.addEventListener('touchstart', forceUnlockAudio, {once:true, passive:false});
    window.addEventListener('mousedown', forceUnlockAudio, {once:true});
    window.addEventListener('keydown', forceUnlockAudio, {once:true});

    const pentatonicBase = [329.63, 369.99, 415.30, 493.88, 554.37];
    const mousePentatonicFreqs = [];
    for(let i=0; i<40; i++) {
        mousePentatonicFreqs.push(pentatonicBase[i%pentatonicBase.length] * (0.5 * Math.pow(2, Math.floor(i/pentatonicBase.length))));
    }

    function getChromaticFrequency(midiNote) {
        return 440 * Math.pow(2, (midiNote - 69) / 12);
    }

    // ============================================
    // 3. KEYBOARD LOGIC
    // ============================================
    let currentOctave = 3; 
    const minOctave = 2;
    const maxOctave = 8;
    const octaveDisplay = document.getElementById('octave-val');

    const keyMap = { 'a': 0, 'w': 1, 's': 2, 'e': 3, 'd': 4, 'f': 5, 't': 6, 'g': 7, 'y': 8, 'h': 9, 'u': 10, 'j': 11, 'k': 12, 'o': 13, 'l': 14 };
    const activeKeys = {}; 

    window.addEventListener('keydown', (e) => {
        if (e.repeat) return; 
        const key = e.key.toLowerCase();
        if (key === 'z') { if (currentOctave > minOctave) currentOctave--; updateUI(); return; }
        if (key === 'x') { if (currentOctave < maxOctave) currentOctave++; updateUI(); return; }
        if (keyMap.hasOwnProperty(key)) { activeKeys[key] = 0; }
    });

    window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if (activeKeys.hasOwnProperty(key)) delete activeKeys[key];
    });

    function updateUI() {
        if (octaveDisplay) {
            octaveDisplay.innerText = `KEYBOARD OCTAVE: ${currentOctave}`;
            octaveDisplay.style.color = '#fff';
            setTimeout(() => octaveDisplay.style.color = '#0ff', 100);
        }
    }

    // ============================================
    // 4. THREE.JS SCENE
    // ============================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.FogExp2(0x000000, 0.02); 

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = isMobile ? 50 : 40;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(isMobile ? Math.min(window.devicePixelRatio, 1.5) : Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const tunnelMaterial = new THREE.LineBasicMaterial({ 
        color: 0x333333, 
        transparent: true, 
        opacity: 0.0, 
        blending: THREE.AdditiveBlending 
    });

    const geometryCount = 40; 
    const radius = 12; 
    const objects = [];
    const pivotGroup = new THREE.Group(); 
    const tunnelGroup = new THREE.Group();
    const tunnelRings = [];
    
    const baseGeometry = new THREE.BoxGeometry(8, 0.5, 8);
    const edgesGeometry = new THREE.EdgesGeometry(baseGeometry);

    // 1. Anel Principal (Cores Base)
    for (let i = 0; i < geometryCount; i++) {
        const angle = (i / geometryCount) * Math.PI * 2;
        const sliceGroup = new THREE.Group();
        
        // Cores calculadas
        const hue = i / geometryCount;
        const edgeColor = new THREE.Color().setHSL(hue, 1.0, 0.5); // Borda neon (50% luz)
        const coreColor = new THREE.Color().setHSL(hue, 1.0, 0.2); // Núcleo profundo (20% luz)

        // Núcleo Sólido Colorido
        const coreMaterial = new THREE.MeshBasicMaterial({ color: coreColor });
        const coreMesh = new THREE.Mesh(baseGeometry, coreMaterial);
        coreMesh.position.z = 0.5;
        coreMesh.renderOrder = 2; 

        // Bordas
        const lineMaterial = new THREE.LineBasicMaterial({ color: edgeColor, linewidth: 2 });
        const lineSegments = new THREE.LineSegments(edgesGeometry, lineMaterial);
        lineSegments.position.z = 0.6;
        lineSegments.renderOrder = 3;

        sliceGroup.add(coreMesh); sliceGroup.add(lineSegments); 
        const x = Math.cos(angle) * radius; const y = Math.sin(angle) * radius;
        sliceGroup.position.set(x, y, 0); sliceGroup.rotation.z = angle;
        
        // Salvamos o coreColor como 'baseColor' para poder retornar a ele depois do flash
        objects.push({ 
            group: sliceGroup, 
            coreMesh: coreMesh, 
            index: i, 
            originalPosition: new THREE.Vector3(x, y, 0), 
            lastTriggerTime: 0,
            baseColor: coreColor 
        });
        
        pivotGroup.add(sliceGroup);
    }
    scene.add(pivotGroup);

    // 2. Túnel
    const numTunnelRings = isMobile ? 10 : 15;
    const tunnelSpacing = 20;
    for (let j = 0; j < numTunnelRings; j++) {
        const ringGroup = new THREE.Group();
        for (let i = 0; i < geometryCount; i+=2) {
            const angle = (i / geometryCount) * Math.PI * 2;
            const x = Math.cos(angle) * radius; const y = Math.sin(angle) * radius;
            const edges = new THREE.EdgesGeometry(baseGeometry);
            const mesh = new THREE.LineSegments(edges, tunnelMaterial);
            mesh.position.set(x, y, 0); mesh.rotation.z = angle;
            ringGroup.add(mesh);
        }
        ringGroup.position.z = -20 - (j * tunnelSpacing);
        ringGroup.renderOrder = 0; 
        tunnelRings.push(ringGroup); tunnelGroup.add(ringGroup);
    }
    scene.add(tunnelGroup);

    // --- INPUT GESTION ---
    const raycaster = new THREE.Raycaster();
    const inputCoords = new THREE.Vector2(999, 999);
    const mouseWorldPos = new THREE.Vector3();
    const zeroPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0); 
    
    function updateInput(x, y) {
        inputCoords.x = (x / window.innerWidth) * 2 - 1;
        inputCoords.y = -(y / window.innerHeight) * 2 + 1;
        if(!isMasterInitialized) forceUnlockAudio();
    }

    window.addEventListener('mousemove', (e) => updateInput(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => { 
        if(e.cancelable) e.preventDefault();
        updateInput(e.touches[0].clientX, e.touches[0].clientY); 
    }, {passive:false});
    window.addEventListener('touchstart', (e) => { 
        if(e.cancelable) e.preventDefault(); 
        forceUnlockAudio(); 
        updateInput(e.touches[0].clientX, e.touches[0].clientY); 
    }, {passive:false});
    window.addEventListener('touchend', () => {
        inputCoords.set(999, 999);
    });

    function triggerVisualAndAudio(visualIndex, frequency, time) {
        updateVisualColor(visualIndex);
        
        const safeIndex = Math.abs(visualIndex) % geometryCount; 
        const obj = objects[safeIndex];
        
        if (obj) {
            obj.coreMesh.material.color.setHex(0xffffff);
            obj.lastTriggerTime = time;
        }
        playNote(frequency);
    }

    // --- ANIMATION LOOP ---
    const clock = new THREE.Clock();
    
    function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime(); 

        // 1. KEYBOARD
        for (const key in activeKeys) {
            if (time - activeKeys[key] > 0.15) {
                const semitone = keyMap[key];
                const midiNote = (currentOctave * 12) + semitone + 12; 
                const freq = getChromaticFrequency(midiNote);
                
                const visualIndex = (currentOctave - minOctave) * 12 + semitone;
                
                triggerVisualAndAudio(visualIndex, freq, time);
                activeKeys[key] = time;
            }
        }

        // 2. BACKGROUND & TUNNEL
        let audioIntensity = 0;
        if (isMasterInitialized && rtaAnalyser) {
            rtaAnalyser.getByteFrequencyData(rtaDataArray);
            let sum = 0;
            for(let i=0; i<20; i++) sum += rtaDataArray[i];
            audioIntensity = (sum / 20) / 255.0; 
        }
        touchImpact *= 0.92;
        const combinedIntensity = Math.max(audioIntensity, touchImpact);

        let targetOpacity = (combinedIntensity > 0.05 || tunnelActiveLevel > 0.1) ? 0.8 : 0.0;
        tunnelActiveLevel *= 0.90; 

        let currentOpacity = tunnelMaterial.opacity;
        currentOpacity += (targetOpacity - currentOpacity) * 0.15; 
        tunnelMaterial.opacity = currentOpacity;

        const tunnelTarget = activeColor.clone();
        const hsl = {}; tunnelTarget.getHSL(hsl);
        hsl.l = Math.max(hsl.l, 0.4); 
        tunnelTarget.setHSL(hsl.h, hsl.s, hsl.l);
        tunnelMaterial.color.lerp(tunnelTarget, 0.05);

        let targetBgColor = mutedBgColor.clone().multiplyScalar(combinedIntensity * 2.0);
        currentBgColor.lerp(targetBgColor, 0.05);
        scene.background.copy(currentBgColor);
        scene.fog.color.copy(currentBgColor);

        if (currentOpacity > 0.01) {
            const speed = 0.1 + (combinedIntensity * 2.5);
            tunnelRings.forEach(ring => {
                ring.position.z += speed;
                if (ring.position.z > 35) {
                    ring.position.z = -20 - ((numTunnelRings * tunnelSpacing));
                }
                ring.rotation.z += 0.005;
            });
        }

        // 3. MOUSE/TOUCH
        raycaster.setFromCamera(inputCoords, camera);
        raycaster.ray.intersectPlane(zeroPlane, mouseWorldPos);
        pivotGroup.rotation.z = time * 0.15; 
        pivotGroup.rotation.x = Math.sin(time * 0.4) * 0.2;

        objects.forEach((obj, idx) => {
            const slice = obj.group;
            const wave = Math.sin(time * 2 + idx * 0.2);
            slice.rotation.x = wave * 0.5; slice.rotation.y = time * 1.5; 
            
            const sliceWorldPos = new THREE.Vector3();
            slice.getWorldPosition(sliceWorldPos);
            const dist = mouseWorldPos.distanceTo(sliceWorldPos);
            let targetPos = obj.originalPosition.clone();

            if (dist < 6.0) {
                const dir = sliceWorldPos.clone().sub(mouseWorldPos).normalize();
                targetPos.add(dir.multiplyScalar((1 - dist/6.0) * 8.0).setZ(0));
                
                if (time - obj.lastTriggerTime > 0.15) {
                    triggerVisualAndAudio(idx, mousePentatonicFreqs[idx], time);
                }
            } else {
                // CORREÇÃO: Volta para a COR BASE PROFUNDA, não mais para o preto!
                if (time - obj.lastTriggerTime > 0.15) {
                    obj.coreMesh.material.color.lerp(obj.baseColor, 0.1);
                }
            }
            slice.position.lerp(targetPos, 0.08);
        });

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        isMobile = window.innerWidth < 600;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = isMobile ? 50 : 40;
    });

    animate();
</script>
</body>
</html>
